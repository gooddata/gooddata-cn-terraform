# Minimal SIE (Superlinked Inference Engine) self-hosted install for the
# local-inference environment — SIE runs IN OUR CLUSTER on our GPU pool.
#
# Chart: oci://ghcr.io/superlinked/charts/sie-cluster
# Install: ./install-sie.sh   (helm install with this values file)
#
# Philosophy: smallest thing that serves generation in-cluster. No KEDA, no
# bundled Prometheus stack, no ingress (gateway is ClusterIP; only gen-ai
# talks to it, from inside the cluster). One warm L4 worker (minReplicas=1)
# instead of scale-to-zero — the GPU node itself scales via the cluster
# autoscaler when the worker pod exists.

fullnameOverride: sie

keda:
  install: false

kube-prometheus-stack:
  install: false

observability:
  logs:
    install: false

kubernetes-event-exporter:
  install: false

autoscaling:
  enabled: false

serviceMonitor:
  enabled: false

ingress:
  enabled: false

gateway:
  auth:
    mode: none # in-cluster only; never expose this service

# Our GPU pool: g6.xlarge = 1x NVIDIA L4 24GB (same mapping as upstream
# values-aws.yaml), nodes tainted workload=inference by the terraform module.
machineProfiles:
  l4:
    gpuType: nvidia-l4
    machineType: g6.xlarge
    spot: false

workers:
  common:
    platform: cuda12
    # Model load runs in the worker MAIN thread (adapter.requires_main_thread)
    # and blocks the HTTP server for minutes — default liveness (3x30s) kills
    # the container mid-load, causing an infinite load->SIGKILL loop.
    # Tolerate ~5 min of unresponsiveness.
    probes:
      liveness:
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 10
      readiness:
        periodSeconds: 5
        timeoutSeconds: 10
        failureThreshold: 60
    extraEnv:
      # The Qwen3-4B manifest loads with mem_fraction_static=0.85, which on a
      # 46GB L40S lands at ~86.6% VRAM — just above the default 85% pressure
      # threshold, so the LRU monitor evicted the model right after every
      # load (load -> evict -> reload loop on each request). 95% leaves the
      # single-model deployment resident.
      - name: SIE_MEMORY_PRESSURE_THRESHOLD_PERCENT
        value: "95"
      # 27B (~54GB) download + FP8 quantize exceeds the default model-load
      # startup window — raise it generously for cold 27B loads.
      - name: SIE_MODEL_LOAD_TIMEOUT_S
        value: "1800"
      - name: SIE_ADAPTER_STARTUP_TIMEOUT_S
        value: "1800"
      - name: SIE_SERVER_STARTUP_TIMEOUT_S
        value: "1800"
    # S3 model cache (terraform: aws/inference-cache.tf) — weights survive
    # GPU scale-to-zero, workers fall back to Hugging Face on cache miss.
    # Node-role credentials (no IRSA needed).
    clusterCache:
      enabled: true
      url: s3://local-inference-model-cache-972873489489/models
  pools:
    l4:
      enabled: true
      machineProfile: l4
      gpuType: l4
      nodeSelector:
        workload: inference
      tolerations:
        - key: workload
          value: inference
          effect: NoSchedule
      gpu:
        count: 1
        product: NVIDIA-L40S
      # g6e.xlarge has exactly 4 vCPU — the chart default (requests cpu=4)
      # can never fit after kube-reserved, so the autoscaler refuses to
      # scale up the pool. Request less, burst to the limit.
      resources:
        requests:
          cpu: "2"
          memory: "12Gi"
        limits:
          cpu: "3500m"
          memory: "24Gi"
      # Generation bundle (sglang). minReplicas=1 = one warm worker; with
      # autoscaling disabled this is the fixed replica count.
      bundles:
        sglang:
          minReplicas: 1
          maxReplicas: 1
