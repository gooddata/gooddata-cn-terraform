# vLLM serving Qwen3.6-27B (FP8) on the inference GPU pool.
#
# Apply after the cluster is up:
#   ./deploy/deploy.sh jan-inference kubectl
#   kubectl apply -f deploy/k8s/vllm-qwen.yaml
#
# First start downloads the model (~30 GB) — expect 10-20 min before Ready.
# In-cluster endpoint (use as LLM_BASE_URL for the LOCAL provider):
#   http://vllm.inference.svc.cluster.local:8000/v1
#
# Sizing: g6e.xlarge = 1x L40S 48 GB. A 27B model needs FP8/AWQ quantization
# to fit with usable KV cache; for bf16 use a multi-GPU instance type
# (g6e.12xlarge, 4x L40S) and add --tensor-parallel-size 4.
apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: inference
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        workload: inference
      tolerations:
        - key: workload
          value: inference
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - --model=Qwen/Qwen3.6-27B
            - --quantization=fp8
            - --max-model-len=32768
            - --enable-auto-tool-choice
            - --tool-call-parser=hermes
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1
              memory: 24Gi
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            # model download + load can take ~20 min on first start
            failureThreshold: 90
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 200Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: inference
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
