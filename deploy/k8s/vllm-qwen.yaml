# vLLM on the inference GPU pool — small-model setup for PIPELINE testing
# (gen-ai -> LOCAL provider -> vLLM -> tool calls). Model quality is not the
# point here; Qwen3-4B fits a single L4 24GB (g6.xlarge) in bf16 and supports
# function calling.
#
# Apply after the cluster is up:
#   ./deploy/deploy.sh local-inference kubectl
#   kubectl apply -f deploy/k8s/vllm-qwen.yaml
#
# First start downloads the model (~8 GB) — a few minutes before Ready.
# In-cluster endpoint (use as LLM_BASE_URL for the LOCAL provider):
#   http://vllm.inference.svc.cluster.local:8000/v1
#
# Cost control: scale to zero when not testing — the autoscaler then removes
# the GPU node (~10 min):
#   kubectl -n inference scale deploy/vllm --replicas=0
#
# Upgrade path to Qwen3.6-27B (quality benchmarks): switch the GPU pool to
# g6e.xlarge and add --quantization=fp8, or g6e.12xlarge (4x L40S) in bf16
# with --tensor-parallel-size=4.
apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: inference
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        workload: inference
      tolerations:
        - key: workload
          value: inference
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - --model=Qwen/Qwen3-4B
            - --max-model-len=16384
            - --enable-auto-tool-choice
            - --tool-call-parser=hermes
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1
              memory: 12Gi
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            # model download + load on first start
            failureThreshold: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 60Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: inference
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
