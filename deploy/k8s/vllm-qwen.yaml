# vLLM on the inference GPU pool — Qwen3.6-27B (open weights from Hugging
# Face) running entirely IN OUR CLUSTER. The benchmark model (~GPT-5.2
# quality), FP8-quantized on the fly to fit a single L40S 48GB (g6e.xlarge).
# Function calling enabled -> full agentic flow through the LOCAL provider.
#
# Apply after the cluster is up:
#   ./deploy/deploy.sh local-inference kubectl
#   kubectl apply -f deploy/k8s/vllm-qwen.yaml
#
# First start downloads bf16 weights (~55 GB) and quantizes to FP8 —
# expect 20-30 min before Ready. Subsequent starts on the same node reuse
# the cache; after scale-to-zero the download repeats.
# In-cluster endpoint (use as LLM_BASE_URL for the LOCAL provider):
#   http://vllm.inference.svc.cluster.local:8000/v1
#
# Cost control: scale to zero when not testing — the autoscaler then removes
# the GPU node (~10 min):
#   kubectl -n inference scale deploy/vllm --replicas=0
#
# Upgrade path to Qwen3.6-27B (quality benchmarks): switch the GPU pool to
# g6e.xlarge and add --quantization=fp8, or g6e.12xlarge (4x L40S) in bf16
# with --tensor-parallel-size=4.
apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: inference
  labels:
    app: vllm
spec:
  replicas: 1
  # single GPU → never run two pods at once (old + new would deadlock on the GPU)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      # K8s injects VLLM_PORT=tcp://... for the "vllm" Service, which vLLM
      # misreads as its own config and crashes. Disable service env injection.
      enableServiceLinks: false
      nodeSelector:
        workload: inference
      tolerations:
        - key: workload
          value: inference
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - --model=Qwen/Qwen3.6-27B
            - --quantization=fp8
            - --max-model-len=8192
            - --enable-auto-tool-choice
            - --tool-call-parser=hermes
            - --reasoning-parser=qwen3
            - --gpu-memory-utilization=0.95
            - --enforce-eager
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1
              memory: 24Gi
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            # 55 GB download + FP8 quantization on first start
            failureThreshold: 140
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 150Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: inference
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
